spring.profiles.include=secret
spring.application.name=Backend


spring.datasource.techzone.jdbc-url=jdbc:sqlserver://localhost:1433;database=TechZoneDB;encrypt=false
spring.datasource.techzone.username=sa
spring.datasource.techzone.password=${DB_PASSWORD}
spring.datasource.techzone.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver


spring.datasource.chatai.jdbc-url=jdbc:sqlserver://localhost:1433;database=Chat_AI;encrypt=false
spring.datasource.chatai.username=sa
spring.datasource.chatai.password=${DB_PASSWORD}
spring.datasource.chatai.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

google.client.id=${GOOGLE_CLIENT_ID}

frontend.url=http://localhost:5173